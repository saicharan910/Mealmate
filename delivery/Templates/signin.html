<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | MealMate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-card {
            background: #1e293b;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        /* Uiverse Animated Input Field style */
        .input-group { position: relative; margin-bottom: 24px; }
        .input-group input {
            width: 100%;
            background: #0f172a;
            border: 2px solid #334155;
            padding: 14px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .input-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .btn-submit {
            width: 100%;
            background: #6366f1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); background: #4f46e5; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="form-card w-full max-w-md p-10">
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-slate-400 mb-8 text-sm font-medium">Please enter your credentials.</p>

        <form action="{% url 'signin' %}" method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="charan_01">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <p class="mt-8 text-center text-sm text-slate-500">
            Don't have an account? <a href="{% url 'open_signup' %}" class="text-indigo-400 font-bold">Register</a>
        </p>
    </div>
</body>
</html>
