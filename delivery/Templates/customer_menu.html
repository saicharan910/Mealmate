<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Menu</title>
    <style>
        :root {
            /* REQUIRED ACCENT COLORS */
            --emerald-green: #017349;
            /* Safe actions, validation, trust indicators */
            --vibrant-orange: #FF7700;
            /* Highlights, primary CTAs, active focus states */
            --deep-pink: #D4426D;
            /* Categorization badges, delete pathways */

            /* PREMIUM NEUTRALS */
            --bg-canvas: #FAF9F5;
            /* Off-white editorial background */
            --bg-surface: #FFFFFF;
            /* Layered paper-white cards */
            --border-ink: #181B19;
            /* Sharp, high-contrast framing line */
            --border-muted: #E2DFD8;
            /* Soft divider lines */
            --text-primary: #181B19;
            /* High-density ink black */
            --text-secondary: #565C58;
            /* Warm charcoal body text */
            --text-muted: #8E9691;
            /* Muted metadata gray */

            /* TYPOGRAPHY */
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;

            /* LAYOUT PHYSICS */
            --radius-editorial: 8px;
            /* Sharp, clean, anti-cartoon edges */
            --transition-premium: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            --shadow-tactile: 4px 4px 0px 0px var(--border-ink);
        }

        /* RESET & DOCUMENT RULES */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .editorial-container {
            max-width: 1120px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        @media (max-width: 768px) {
            .editorial-container {
                margin: 1.5rem auto;
                padding: 0 1rem;
            }
        }

        /* NAVIGATION BAR */
        .editorial-nav {
            background-color: var(--bg-surface);
            border-bottom: 2px solid var(--border-ink);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .editorial-nav-brand {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.04em;
        }

        .editorial-nav-brand span {
            color: var(--vibrant-orange);
        }

        /* TYPOGRAPHY COMPONENTS */
        .editorial-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--border-ink);
            padding-bottom: 1.5rem;
            margin-bottom: 3.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .editorial-title {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            color: var(--text-primary);
        }

        .editorial-title em {
            font-style: italic;
            font-weight: 600;
            color: var(--emerald-green);
        }

        .editorial-meta-badge {
            display: inline-block;
            color: var(--deep-pink);
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        /* BUTTONS (No Glow, Tactile Depth) */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-premium);
            border: 2px solid var(--border-ink);
            background-color: transparent;
            color: var(--text-primary);
            position: relative;
            box-shadow: 2px 2px 0px 0px var(--border-ink);
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px 0px var(--border-ink);
        }

        .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px 0px var(--border-ink);
        }

        .btn-emerald {
            background-color: var(--emerald-green);
            color: var(--bg-canvas);
        }

        .btn-emerald:hover {
            background-color: #015938;
        }

        .btn-orange {
            background-color: var(--vibrant-orange);
            color: var(--bg-canvas);
        }

        .btn-orange:hover {
            background-color: #e06900;
        }

        /* STRUCTURED TABLE CONTAINER */
        .table-container {
            background-color: var(--bg-surface);
            border: 2px solid var(--border-ink);
            border-radius: var(--radius-editorial);
            overflow-x: auto;
            box-shadow: var(--shadow-tactile);
            margin-bottom: 3.5rem;
        }

        .editorial-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .editorial-table th {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1.25rem 1.5rem;
            border-bottom: 2px solid var(--border-ink);
        }

        .editorial-table td {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-muted);
            color: var(--text-secondary);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .editorial-table tr:last-child td {
            border-bottom: none;
        }

        .editorial-table tbody tr:hover td {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
        }

        /* Thumbnails styled cleanly without overlapping cartoon rounded lines */
        .table-thumb {
            width: 110px;
            height: 85px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid var(--border-ink);
            display: block;
        }

        /* REUSABLE BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 2px solid var(--border-ink);
        }

        .badge-emerald {
            background-color: var(--emerald-green);
            color: var(--bg-canvas);
        }

        .badge-pink {
            background-color: var(--deep-pink);
            color: var(--bg-canvas);
        }
    </style>
</head>

<body>

    <nav class="editorial-nav">
        <a href="{% url 'customer_home' username %}" class="editorial-nav-brand">MealMate<span>.</span></a>
        <a href="{% url 'show_cart' username %}" class="btn btn-emerald">Go to cart</a>
    </nav>

    <main class="editorial-container">

        <header class="editorial-header">
            <div>
                <span class="editorial-meta-badge">AUTHENTIC FLAVORS</span>
                <h1 class="editorial-title">Welcome <em>{{username}}!</em></h1>
            </div>
        </header>

        <div class="table-container">
            <table class="editorial-table">
                <thead>
                    
                </thead>
                <tbody>
                    {% for item in itemList %}
                    <tr>
                        <td style="font-weight: 800; color: var(--text-primary); font-size: 1.1rem;">
                            {{ item.name }}
                        </td>
                        <td>
                            <img class="table-thumb" src="{{ item.picture }}" alt="{{ item.name }}">
                        </td>
                        <td
                            style="max-width: 320px; color: var(--text-secondary); line-height: 1.5; font-size: 0.9rem;">
                            {{ item.description }}
                        </td>
                        <td style="font-weight: 800; color: var(--text-primary);">
                            ₹{{ item.price }}
                        </td>
                        <td>
                            {% if item.vegeterian == "True" or item.vegeterian == True %}
                            <span class="badge badge-emerald">Veg</span>
                            {% else %}
                            <span class="badge badge-pink">Non-Veg</span>
                            {% endif %}
                        </td>
                        <td style="text-align: right;">
                            <a href="{% url 'add_to_cart' item.id username %}" class="btn btn-orange"
                                style="padding: 0.6rem 1.2rem; font-size: 0.8rem; box-shadow: none;">
                                Add to cart
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </main>

    <div id="cart-toast" style="display: none; position: fixed; top: 20px; right: 20px; z-index: 1000; 
                background-color: var(--primary, #017349); color: white; 
                font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 0.9rem;
                padding: 1rem 1.5rem; border-radius: 8px; border: 2px solid #181B19;
                box-shadow: 4px 4px 0px 0px #181B19; transition: opacity 0.3s ease; opacity: 0;">
        Item added to cart! 🛒
    </div>
    
    <script>
        function triggerAddToCart(event, element) {
            event.preventDefault(); // Prevents the browser from reloading the page

            const url = element.getAttribute('href');
            const toast = document.getElementById('cart-toast');

            // Make an asynchronous request to Django backend to add the item to cart
            fetch(url, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
                .then(response => {
                    // Show the toast notification
                    toast.style.display = 'block';
                    setTimeout(() => {
                        toast.style.opacity = '1';
                    }, 10);

                    // Hide and fade out after 2 seconds
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => {
                            toast.style.display = 'none';
                        }, 300); // Wait for fade-out transition to complete
                    }, 2000);
                })
                .catch(error => console.error('Error adding to cart:', error));
        }
    </script>
</body>

</html>
