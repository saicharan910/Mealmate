{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | Mealmate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .main_wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30em;
            height: 30em;
            position: relative;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 5em;
        }

        .antenna {
            width: 5em; height: 5em;
            border-radius: 50%;
            border: 2px solid black;
            background-color: #f27405;
            margin-bottom: -6em;
            z-index: -1;
            position: relative;
        }

        .antenna_shadow {
            position: absolute;
            background-color: transparent;
            width: 50px; height: 56px;
            margin-left: 1.68em;
            border-radius: 45%;
            transform: rotate(140deg);
            border: 4px solid transparent;
            box-shadow: inset 0px 16px #a85103;
        }

        .a1 {
            position: absolute;
            top: -100%; left: -110%;
            width: 12em; height: 5.5em;
            background: linear-gradient(#171717, #353535, #171717);
            transform: rotate(-29deg);
            clip-path: polygon(50% 0%, 49% 100%, 52% 100%);
        }

        .a2 {
            position: absolute;
            top: -90%; left: 30%;
            width: 12em; height: 4em;
            background: linear-gradient(#171717, #353535, #171717);
            transform: rotate(15deg);
            clip-path: polygon(47% 0, 34% 34%, 32% 100%, 49% 32%);
        }

        .tv {
            width: 17em; height: 9em;
            margin-top: 3em;
            border-radius: 15px;
            background-color: #d36604;
            display: flex;
            justify-content: center;
            border: 2px solid #1d0e01;
            box-shadow: inset 0.2em 0.2em #e69635;
            position: relative;
        }

        .display_div {
            display: flex;
            align-items: center;
            align-self: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 3.5px 3.5px 0px #e69635;
        }

        .screen_out1 {
            width: 11em; height: 7.75em;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .screen {
            width: 13em; height: 7.85em;
            border: 2px solid #1d0e01;
            background: repeating-radial-gradient(#000 0 0.0001%, #fff 0 0.0002%) 50% 0/2500px 2500px;
            animation: b 0.2s infinite alternate;
            border-radius: 10px;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notfound_text {
            background-color: black;
            padding: 0.2em 0.5em;
            font-size: 0.8em;
            color: white;
            border-radius: 5px;
        }

        .buttons_div {
            width: 4.25em; height: 8em;
            background-color: #e69635;
            border: 2px solid #1d0e01;
            margin-left: 0.5em;
            align-self: center;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }

        .b1, .b2 {
            width: 1.5em; height: 1.5em;
            border-radius: 50%;
            background-color: #7f5934;
            border: 2px solid black;
        }

        .speakers {
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 2em;
        }

        .g { width: 100%; height: 2px; background: #171717; }

        .text_404 {
            position: absolute;
            display: flex;
            gap: 5em;
            z-index: -5;
            opacity: 0.15;
            font-size: 5em;
        }

        .back-home {
            position: absolute;
            bottom: 2em;
            padding: 12px 24px;
            background-color: #d36604;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            border: 2px solid #1d0e01;
            box-shadow: 4px 4px 0px #1d0e01;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .back-home:hover {
            transform: translateY(-3px);
            background-color: #e69635;
            box-shadow: 6px 6px 0px #1d0e01;
        }

        @keyframes b { 100% { background-position: 50% 0, 60% 50%; } }

        .back-home {
  position: absolute;
  bottom: 10%; /* Positions it clearly below the TV */
  padding: 12px 24px;
  background-color: #d36604; /* Matches the TV orange */
  color: white;
  text-decoration: none;
  font-weight: bold;
  border-radius: 30px;
  border: 2px solid #1d0e01;
  box-shadow: 4px 4px 0px #1d0e01;
  transition: all 0.2s ease;
  z-index: 100;
}

.back-home:hover {
  transform: translateY(-3px);
  background-color: #e69635;
  box-shadow: 6px 6px 0px #1d0e01;
}
    </style>
</head>
<body>

<div class="main_wrapper">
    <div class="text_404">
    <div class="text_4041">4</div>
    <div class="text_4042">0</div>
    <div class="text_4043">4</div>
  </div>

  <a href="{% url 'landing' %}" class="back-home">Back to Mealmate</a>
    <div class="main">
        <div class="antenna">
            <div class="antenna_shadow"></div>
            <div class="a1"></div>
            <div class="a2"></div>
        </div>
        <div class="tv">
            <div class="display_div">
                <div class="screen_out1">
                    <div class="screen">
                        <span class="notfound_text">NOT FOUND</span>
                    </div>
                </div>
            </div>
            <div class="buttons_div">
                <div class="b1"></div>
                <div class="b2"></div>
                <div class="speakers">
                    <div class="g"></div>
                    <div class="g"></div>
                    <div class="g"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="text_404">
        <div>4</div>
        <div>0</div>
        <div>4</div>
    </div>

    <a href="{% url 'landing' %}" class="back-home">Back to Mealmate</a>
</div>

</body>
</html>
