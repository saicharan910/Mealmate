<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MealMate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar { background: #0f172a; width: 260px; height: 100vh; position: fixed; left: 0; top: 0; color: white; padding: 2rem; }
        .main-content { margin-left: 260px; padding: 3rem; }
        @media (max-width: 1024px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
        /* Uiverse 3D Card variation for Stats */
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 class="text-xl font-extrabold mb-10 tracking-tighter">MEALMATE <span class="text-indigo-400">ADMIN</span></h2>
        <nav class="space-y-4">
            <a href="#" class="block p-3 rounded-lg bg-indigo-600 font-bold">Dashboard</a>
            <a href="#" class="block p-3 rounded-lg text-slate-400 hover:text-white transition">Orders</a>
            <a href="#" class="block p-3 rounded-lg text-slate-400 hover:text-white transition">Customers</a>
            <a href="#" class="block p-3 rounded-lg text-slate-400 hover:text-white transition">Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-extrabold">Control Center</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-bold text-slate-500">Welcome, Admin</span>
                <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="stat-card">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Total Orders</p>
                <h3 class="text-3xl font-black">1,482</h3>
            </div>
            <div class="stat-card border-l-4 border-l-indigo-600">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Active Users</p>
                <h3 class="text-3xl font-black text-indigo-600">549</h3>
            </div>
            <div class="stat-card">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Daily Revenue</p>
                <h3 class="text-3xl font-black">$4,200</h3>
            </div>
        </div>

        <section class="bg-white rounded-3xl p-8 border border-slate-200 shadow-sm">
            <h2 class="text-xl font-bold mb-6">Recent Activity</h2>
            <div class="space-y-4">
                <!-- Activity Item -->
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-xl">📦</div>
                        <div>
                            <p class="font-bold">New order from Sai Charan</p>
                            <p class="text-xs text-slate-500">Order #MM-9021 • Tirupati</p>
                        </div>
                    </div>
                    <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-black uppercase">Success</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
