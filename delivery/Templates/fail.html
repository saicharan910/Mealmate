<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failed | MealMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="ambient-glow"></div>
    <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass-card" style="border-color: rgba(212, 66, 109, 0.5); text-align: center; max-width: 400px; width: 100%;">
            <h1 style="color: var(--pink); margin-bottom: var(--sp-2);">Invalid Credentials</h1>
            <p style="color: var(--text-muted); margin-bottom: var(--sp-4);">Please check your username and password.</p>
            <a href="{% url 'open_signin' %}" class="btn-primary" style="text-decoration: none; display: inline-block;">Try Again</a>
        </div>
    </main>
</body>
</html>
