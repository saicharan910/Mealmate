<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealMate 😋 | End Your Hunger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
        }
        /* Uiverse Matrix-Style Background influence */
        .bg-mesh {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  
  --s: 90px; /* size */
  --c-half-left: hsl(10, 50%, 50%); 
  --c-half-right: hsl(40, 50%, 80%);
  --c-bottom: hsl(180, 50%, 50%);

  background: conic-gradient(
    from 0deg at 50% 50%,
    var(--c-half-left) 0deg 120deg,
    var(--c-bottom) 120deg 240deg,
    var(--c-half-right) 240deg 360deg
  );
  background-size: var(--s) var(--s);
}
        /* Glassmorphism Card by csozidev */
        .hero-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Cyberpunk Button style */
        .btn-main {
            background: var(--primary);
            color: white;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
            background: #4f46e5;
        }
        /* Favorite Button Styles */
.fav-btn-container {
    background-color: white;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 8px 20px;
    cursor: pointer;
    user-select: none;
    border-radius: 12px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    color: #1e293b;
    margin: 20px 0;
    font-weight: 600;
}

#favorite { display: none; }

#favorite:checked + .fav-btn-container svg {
    fill: #ef4444;
    stroke: #ef4444;
    animation: heartButton 1s;
}

@keyframes heartButton {
    0%, 50%, 100% { transform: scale(1); }
    25%, 75% { transform: scale(1.3); }
}

.action { position: relative; overflow: hidden; display: grid; height: 24px; }
.action span { grid-column: 1; grid-row: 1; transition: all .4s ease; }
.option-1 { transform: translateY(0); opacity: 1; }
.option-2 { transform: translateY(100%); opacity: 0; }

#favorite:checked + .fav-btn-container .option-1 { transform: translateY(-100%); opacity: 0; }
#favorite:checked + .fav-btn-container .option-2 { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-mesh"></div>
    <main class="max-w-4xl w-full text-center">
        <div class="hero-card p-10 md:p-20">
            <div class="mb-6 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-bold uppercase tracking-widest">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                </span>
                Hunger ends here
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-none">
                MealMate <span class="text-indigo-500">🍔</span>
            </h1>
            <p class="text-lg text-slate-400 mb-10 max-w-lg mx-auto">
                The most sophisticated food delivery platform. Real-time tracking, premium vendors, and instant satisfaction.
            </p>
            <input type="checkbox" id="favorite" name="favorite-checkbox" value="favorite-button">
<label for="favorite" class="fav-btn-container">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    <div class="action">
        <span class="option-1">Add to Favorites</span>
        <span class="option-2">Added to Favorites</span>
    </div>
</label>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="{% url 'open_signup' %}" class="btn-main text-center">Join the Club</a>
                <a href="{% url 'open_signin' %}" class="px-8 py-[14px] rounded-xl border border-slate-700 font-bold hover:bg-slate-800 transition-all text-center">Sign In</a>
            </div>
        </div>
    </main>
</body>
</html>
